{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2>Dostawcy</h2>
        <button type="button" class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addSupplierModal">
            Dodaj Dostawcę
        </button>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nazwa Firmy</th>
                    <th>Email</th>
                    <th>Akcje</th>
                </tr>
            </thead>
            <tbody>
                {% for supplier in suppliers %}
                <tr>
                    <td>{{ supplier.id }}</td>
                    <td>{{ supplier.company_name }}</td>
                    <td>{{ supplier.email }}</td>
                    <td>
                        <button type="button" class="btn btn-sm btn-warning" data-bs-toggle="modal"
                            data-bs-target="#editSupplierModal{{ supplier.id }}">
                            Edytuj
                        </button>
                        <form method="POST" action="{{ url_for('delete_supplier', id=supplier.id) }}" class="d-inline"
                            onsubmit="return confirm('Czy na pewno chcesz usunąć tego dostawcę?');">
                            <button type="submit" class="btn btn-sm btn-danger">Usuń</button>
                        </form>

                        <!-- Edit Modal -->
                        <div class="modal fade" id="editSupplierModal{{ supplier.id }}" tabindex="-1"
                            aria-hidden="true">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h5 class="modal-title">Edytuj Dostawcę: {{ supplier.company_name }}</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                            aria-label="Close"></button>
                                    </div>
                                    <div class="modal-body">
                                        <form method="POST" action="{{ url_for('edit_supplier', id=supplier.id) }}">
                                            <div class="mb-3">
                                                <label class="form-label">Nazwa Firmy</label>
                                                <input type="text" class="form-control" name="company_name"
                                                    value="{{ supplier.company_name }}" required>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Email</label>
                                                <input type="email" class="form-control" name="email"
                                                    value="{{ supplier.email }}">
                                            </div>
                                            <button type="submit" class="btn btn-primary">Zapisz Zmiany</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Add Supplier Modal -->
<div class="modal fade" id="addSupplierModal" tabindex="-1" aria-labelledby="addSupplierModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addSupplierModalLabel">Dodaj Nowego Dostawcę</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form method="POST" action="{{ url_for('suppliers') }}">
                    <div class="mb-3">
                        <label for="company_name" class="form-label">Nazwa Firmy</label>
                        <input type="text" class="form-control" id="company_name" name="company_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email">
                    </div>
                    <button type="submit" class="btn btn-primary">Zapisz</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
